<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My First Web Page</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<h1>Hello, world</h1>
<p>This is my first web page.</p>


<script src="js/gsap.min.js"></script>
<script src="js/ScrollTrigger.min.js"></script>
<script src="js/main.js"></script>


<div id="scrolly-section">
  <div class="stage">
    <div class="character left-char">
      <object id="char-l" data="images/camera.svg" type="image/svg+xml"></object>
      <div class="bubble" id="bubble-l"></div>
    </div>

    <div class="character right-char">
      <object id="char-r" data="images/hyp.svg" type="image/svg+xml"></object>
      <div class="bubble" id="bubble-r"></div>
    </div>
  </div>

  <div class="script">
    <div class="step" data-who="left" data-text="Hello there! How are you?"></div>
    <div class="step" data-who="right" data-text="I'm doing great, just scrolling by!"></div>
    <div class="step" data-who="left" data-text="Did you see how this SVG is pinned?"></div>
    <div class="step" data-who="right" data-text="It's like magic! ✨"></div>
  </div>
</div>


</body>
</html>
