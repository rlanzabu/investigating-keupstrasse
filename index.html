<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My First Web Page</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<h1>Hello, world</h1>
<p>This is my first web page.</p>


<script src="js/gsap.min.js"></script>
<script src="js/ScrollTrigger.min.js"></script>
<script src="js/script.js"></script>


<div class="main-container">
  <div class="side left">
    <div class="object" id="obj1-left">
      <object id="cameraSvg" data="images/camera.svg" type="image/svg+xml"></object>
    </div>
    <div class="object" id="obj2-left">
      <object class="large-svg" id="mySvg2-left" data="images/hyp.svg" type="image/svg+xml"></object>
    </div>
  </div>

  <div class="side right">
    <div class="object" id="obj1-right">
      <object id="cameraSvgMirror" data="images/camera.svg" type="image/svg+xml"></object>
    </div>
    <div class="object" id="obj2-right">
      <object class="large-svg" id="mySvg2-right" data="images/hyp.svg" type="image/svg+xml"></object>
    </div>
  </div>
</div>


</body>
</html>
